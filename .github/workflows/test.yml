name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spending-priority/package-lock.json
      - name: Install dependencies
        working-directory: spending-priority
        run: npm ci
      - name: Run frontend tests
        working-directory: spending-priority
        run: npm test

  test-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spending-priority/functions/package-lock.json
      - name: Install functions dependencies
        working-directory: spending-priority/functions
        run: npm ci
      - name: Run functions tests
        working-directory: spending-priority/functions
        run: npm test
