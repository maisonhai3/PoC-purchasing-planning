name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.filter.outputs.functions }}
      hosting: ${{ steps.filter.outputs.hosting }}
      firestore: ${{ steps.filter.outputs.firestore }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            functions:
              - 'spending-priority/functions/**'
            hosting:
              - 'spending-priority/src/**'
              - 'spending-priority/index.html'
              - 'spending-priority/vite.config.js'
              - 'spending-priority/package.json'
              - 'spending-priority/package-lock.json'
            firestore:
              - 'spending-priority/firestore.rules'
              - 'spending-priority/firestore.indexes.json'

  deploy-functions:
    needs: detect-changes
    if: needs.detect-changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spending-priority/functions/package-lock.json
      - name: Install Functions dependencies
        working-directory: spending-priority/functions
        run: npm ci
      - name: Deploy Firebase Functions
        working-directory: spending-priority
        run: npx firebase-tools@^15 deploy --only functions --project spending-priority --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

  deploy-hosting:
    needs: detect-changes
    if: needs.detect-changes.outputs.hosting == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spending-priority/package-lock.json
      - name: Install dependencies
        working-directory: spending-priority
        run: npm ci
      - name: Build
        working-directory: spending-priority
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_BASE_URL: ${{ secrets.VITE_FUNCTIONS_BASE_URL }}
        run: npm run build
      - name: Deploy Firebase Hosting
        working-directory: spending-priority
        run: npx firebase-tools@^15 deploy --only hosting --project spending-priority --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

  deploy-firestore:
    needs: detect-changes
    if: needs.detect-changes.outputs.firestore == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
      - name: Deploy Firestore Rules & Indexes
        working-directory: spending-priority
        run: npx firebase-tools@^15 deploy --only firestore --project spending-priority --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
